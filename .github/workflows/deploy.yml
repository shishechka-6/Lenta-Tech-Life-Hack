name: Build and deploy

on:
  push:
    branches:
      - deploy
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python syntax check
        run: python3 -m compileall services

      - name: Validate local compose
        run: docker compose -f docker-compose.local.yml config

      - name: Validate prod compose
        run: docker compose --env-file deploy/.env.prod.example -f deploy/docker-compose.prod.yml config

  build:
    name: Build and push images
    runs-on: ubuntu-latest
    needs: checks

    outputs:
      backend-image: ${{ steps.images.outputs.backend-image }}
      frontend-image: ${{ steps.images.outputs.frontend-image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image names
        id: images
        shell: bash
        run: |
          set -euo pipefail
          repo_lc="${GITHUB_REPOSITORY,,}"
          image_tag="sha-${GITHUB_SHA::12}"

          backend_image="${REGISTRY}/${repo_lc}/lenta-backend:${image_tag}"
          frontend_image="${REGISTRY}/${repo_lc}/lenta-frontend:${image_tag}"

          echo "BACKEND_IMAGE_BASE=${REGISTRY}/${repo_lc}/lenta-backend" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE_BASE=${REGISTRY}/${repo_lc}/lenta-frontend" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${image_tag}" >> "$GITHUB_ENV"
          echo "backend-image=${backend_image}" >> "$GITHUB_OUTPUT"
          echo "frontend-image=${frontend_image}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE_BASE }}:${{ env.IMAGE_TAG }}
            ${{ env.BACKEND_IMAGE_BASE }}:deploy
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE_BASE }}:${{ env.IMAGE_TAG }}
            ${{ env.FRONTEND_IMAGE_BASE }}:deploy
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

