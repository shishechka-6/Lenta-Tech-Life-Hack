name: lenta-tech

services:
  backend:
    image: ${BACKEND_IMAGE:?set BACKEND_IMAGE in .env.prod}
    pull_policy: always
    environment:
      LENTA_MODEL_PATH: /models/best.pt
      LENTA_DEVICE: ${LENTA_DEVICE:-cpu}
      LENTA_CONF: ${LENTA_CONF:-0.25}
      LENTA_IOU: ${LENTA_IOU:-0.5}
      LENTA_IMGSZ: ${LENTA_IMGSZ:-1280}
      LENTA_K_BEST_CROPS: ${LENTA_K_BEST_CROPS:-1}
      LENTA_MAX_CROP_SIDE: ${LENTA_MAX_CROP_SIDE:-768}
      LENTA_MIN_TRACK_DETECTIONS: ${LENTA_MIN_TRACK_DETECTIONS:-2}
      LENTA_DECODE_CODES_ON_CROPS: ${LENTA_DECODE_CODES_ON_CROPS:-0}
      LENTA_STORAGE_DIR: /data/jobs
      LENTA_MAX_UPLOAD_MB: ${LENTA_MAX_UPLOAD_MB:-2048}
      LENTA_JOB_WORKERS: ${LENTA_JOB_WORKERS:-1}
      YOLO_CONFIG_DIR: /cache/ultralytics
      PADDLE_PDX_CACHE_HOME: /cache/paddlex
      PADDLEOCR_HOME: /cache/paddleocr
      PADDLE_HOME: /cache/paddle
    ports:
      - "${BACKEND_BIND:-127.0.0.1}:${BACKEND_PORT:-8000}:8000"
    volumes:
      - ${MODEL_PATH:?set MODEL_PATH in .env.prod}:/models/best.pt:ro
      - backend-ultralytics-cache:/cache/ultralytics
      - backend-paddlex-cache:/cache/paddlex
      - backend-paddleocr-cache:/cache/paddleocr
      - backend-paddle-cache:/cache/paddle
      - backend-job-storage:/data/jobs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE:?set FRONTEND_IMAGE in .env.prod}
    pull_policy: always
    environment:
      BACKEND_URL: http://backend:8000
      REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS:-3600}
      STATUS_TIMEOUT_SECONDS: ${STATUS_TIMEOUT_SECONDS:-30}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-2}
    expose:
      - "8501"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health', timeout=2).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  proxy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_BIND:-0.0.0.0}:${HTTP_PORT:-80}:80"
    command:
      - caddy
      - reverse-proxy
      - --from
      - :80
      - --to
      - frontend:8501
    depends_on:
      frontend:
        condition: service_healthy

volumes:
  backend-ultralytics-cache:
  backend-paddlex-cache:
  backend-paddleocr-cache:
  backend-paddle-cache:
  backend-job-storage:
